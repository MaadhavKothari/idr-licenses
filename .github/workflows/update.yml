name: Update Bioimaging License Catalogs

on:
  schedule:
    # 9:00 AM PST = 17:00 UTC
    - cron: '0 17 * * *'
  workflow_dispatch: # allow manual trigger

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Fetch IDR studies
        run: python fetch_idr.py --refresh

      - name: Fetch BioImage Archive studies
        run: python fetch_bia.py --refresh

      - name: Build combined view
        run: python build_combined.py

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html output/
          if git diff --cached --quiet; then
            echo "No changes detected"
          else
            git commit -m "Update license catalogs ($(date -u +%Y-%m-%d))"
            git push
          fi
