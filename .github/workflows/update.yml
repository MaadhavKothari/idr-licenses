name: Update IDR Studies

on:
  schedule:
    # 9:00 AM PST = 17:00 UTC
    - cron: '0 17 * * *'
  workflow_dispatch: # allow manual trigger

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Fetch IDR studies and export
        run: python fetch_idr.py --refresh

      - name: Copy report to index.html
        run: cp output/idr_studies.html index.html

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html output/idr_studies.html output/idr_studies.csv
          if git diff --cached --quiet; then
            echo "No changes detected"
          else
            git commit -m "Update IDR studies data ($(date -u +%Y-%m-%d))"
            git push
          fi
