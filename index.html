<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bioimaging License Catalogs</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f5f5f5; color: #333; }
  .header { background: #283d6b; color: #fff; padding: 20px 24px 0; }
  .header h1 { font-size: 26px; margin-bottom: 4px; }
  .header .subtitle { color: #aab8d8; font-size: 13px; margin-bottom: 16px; }
  .tabs { display: flex; gap: 4px; }
  .tab { padding: 10px 24px; background: rgba(255,255,255,0.1); color: #ccc; border: none; border-radius: 8px 8px 0 0; cursor: pointer; font-size: 14px; font-weight: 600; transition: background 0.15s; }
  .tab:hover { background: rgba(255,255,255,0.2); color: #fff; }
  .tab.active { background: #f5f5f5; color: #283d6b; }
  .tab-content { display: none; }
  .tab-content.active { display: block; }
  iframe { width: 100%; border: none; height: calc(100vh - 100px); }
  .footer { text-align: center; color: #999; font-size: 12px; padding: 12px; background: #fff; border-top: 1px solid #eee; }
  .footer a { color: #1a73e8; text-decoration: none; }
</style>
</head>
<body>
<div class="header">
  <h1>Bioimaging License Catalogs</h1>
  <p class="subtitle">Interactive dashboards of open bioimaging repositories &mdash; updated daily at 9am PST</p>
  <div class="tabs">
    <button class="tab active" onclick="switchTab('idr')">IDR &mdash; Image Data Resource (141)</button>
    <button class="tab" onclick="switchTab('bia')">BIA &mdash; BioImage Archive (4,436)</button>
    <button class="tab" onclick="switchTab('combined')">Combined View</button>
  </div>
</div>

<div id="tab-idr" class="tab-content active">
  <iframe src="output/idr_studies.html" id="iframe-idr"></iframe>
</div>

<div id="tab-bia" class="tab-content">
  <iframe id="iframe-bia" data-src="output/bia_studies.html"></iframe>
</div>

<div id="tab-combined" class="tab-content">
  <iframe id="iframe-combined" data-src="output/combined_studies.html"></iframe>
</div>

<div class="footer">
  Auto-updated via <a href="https://github.com/MaadhavKothari/idr-licenses" target="_blank">GitHub Actions</a> &mdash;
  data from <a href="https://idr.openmicroscopy.org" target="_blank">idr.openmicroscopy.org</a> and
  <a href="https://www.ebi.ac.uk/bioimage-archive/" target="_blank">ebi.ac.uk/bioimage-archive</a>
</div>

<script>
function switchTab(name) {
  // Update tab buttons
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  event.target.classList.add('active');

  // Update tab content
  document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
  document.getElementById('tab-' + name).classList.add('active');

  // Lazy-load iframes on first click
  const iframe = document.getElementById('iframe-' + name);
  if (iframe && iframe.dataset.src && !iframe.src) {
    iframe.src = iframe.dataset.src;
  }
}
</script>
</body>
</html>
